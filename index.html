<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原型目录</title>
<style>
:root {
  --bg: #f0ede8;
  --card: #ffffff;
  --text: #1a1a1a;
  --muted: #888888;
  --border: #e5e0d8;
  --accent1: #6B3A2A;
  --accent2: #2563eb;
  --shadow: 0 2px 16px rgba(0,0,0,0.06);
  --shadow-hover: 0 6px 28px rgba(0,0,0,0.12);
  --radius: 14px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 60px 20px;
}

.container {
  max-width: 520px;
  width: 100%;
}

.header {
  text-align: center;
  margin-bottom: 40px;
}

.header h1 {
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}

.header p {
  font-size: 15px;
  color: var(--muted);
}

.card-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.card-item a {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--card);
  border-radius: var(--radius);
  padding: 22px 24px;
  text-decoration: none;
  color: inherit;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card-item a:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-hover);
}

.card-left {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.card-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
}

.card-subtitle {
  font-size: 13px;
  color: var(--muted);
}

.card-arrow {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: #fff;
  flex-shrink: 0;
}

.card-arrow.accent1 { background: var(--accent1); }
.card-arrow.accent2 { background: var(--accent2); }

.footer {
  text-align: center;
  margin-top: 36px;
  font-size: 13px;
  color: var(--muted);
}

/* mobile phone frame tag */
.tag {
  display: inline-block;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: #f0ede8;
  color: var(--muted);
  margin-left: 8px;
  vertical-align: middle;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>原型目录</h1>
    <p>移动端页面原型入口</p>
  </div>

  <ul class="card-list">
    <li class="card-item">
      <a href="home.html">
        <div class="card-left">
          <span class="card-title">用户端 <span class="tag">首页</span></span>
          <span class="card-subtitle">商品展示与查单 · 移动端原型</span>
        </div>
        <div class="card-arrow accent1">→</div>
      </a>
    </li>
    <li class="card-item">
      <a href="baodan-tuanzhang.html">
        <div class="card-left">
          <span class="card-title">团长端 <span class="tag">管理</span></span>
          <span class="card-subtitle">团长报单与管理 · 移动端原型</span>
        </div>
        <div class="card-arrow accent2">→</div>
      </a>
    </li>
  </ul>

  <div class="footer">
    Prototype Directory &mdash; Click to preview mobile UI
  </div>
</div>
</body>
</html>
